<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Grabber</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1 class="title">Score Grabber</h1>
      <button id="btn-debug" class="btn-icon" title="Mostrar/ocultar depuración">🔧</button>
    </div>

    <div id="loading" class="message">
      <p>Cargando...</p>
    </div>

    <div id="error" class="message" style="display: none;">
      <p id="error-text"></p>
    </div>

    <div id="content" style="display: none;">
      <div class="score-info">
        <p id="score-title" class="score-title"></p>
        <p id="score-composer" class="score-composer"></p>
        <p id="score-id-display" class="score-id"></p>
      </div>

      <div id="status" class="status" style="display: none;">
        <p id="status-text"></p>
      </div>

      <div class="buttons">
        <button id="btn-midi" class="btn">Descargar MIDI</button>
        <button id="btn-mp3" class="btn">Descargar MP3</button>
        <button id="btn-pdf" class="btn">Descargar PDF</button>
        <button id="btn-sheet" class="btn btn-secondary">Ver partitura</button>
      </div>
    </div>

    <div id="debug-panel" class="debug-panel" style="display: none;">
      <div class="debug-header">
        <h3>Registro de depuración</h3>
        <button id="btn-clear-log" class="btn-small">Limpiar</button>
      </div>
      <div id="debug-log" class="debug-log"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
